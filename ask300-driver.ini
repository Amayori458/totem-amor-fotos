; Setting file for ASK300 Printer Driver
; Configuração para impressora ASK300 - Totem Amor por Fotos

[Setting]
; Vendor ID da impressora ASK300
VendorID=0x4CB

; Product ID da impressora ASK300
ProductID=0x5006

; Nome do arquivo INF do driver USB
InfFile=fpusbdrv.inf

; Nome do arquivo do driver USB
SysFile=fpusbdrv.sys

[Printer]
; Modelo da impressora
Model=ASK300

; Nome amigável
FriendlyName=Impressora Totem Amor por Fotos

; Resolução padrão (DPI)
DPI=300

; Tamanho de papel padrão (10x15 ou 15x21)
PaperSize=10x15

; Modo de cor (color ou grayscale)
ColorMode=color

; Qualidade de impressão (draft, normal, high)
Quality=high

[Kiosk]
; Modo kiosk ativado
Enabled=true

; Iniciar em tela cheia
Fullscreen=true

; Iniciar automaticamente
AutoStart=true

; Timeout de inatividade (ms)
InactivityTimeout=30000

; Idioma
Language=pt-BR

; Porta do servidor
Port=3000

; Host
Host=localhost
